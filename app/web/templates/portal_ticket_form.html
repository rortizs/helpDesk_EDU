{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8">
  <a class="text-decoration-none small" href="/portal">← Back to your portal</a>
  <h1 class="mt-3">Open a support ticket</h1>
  <p class="text-secondary">Tell us what is preventing you from learning or teaching effectively.</p>
  <form class="card border-0 shadow-sm" method="post" action="/portal/tickets/new">
    <div class="card-body p-4">
      <label class="form-label" for="title">What do you need help with?</label>
      <input id="title" name="title" class="form-control mb-3" required minlength="3">
      <label class="form-label" for="description">Describe the issue</label>
      <textarea id="description" name="description" class="form-control mb-3" rows="5" required></textarea>
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label" for="category">Category</label><select id="category" name="category" class="form-select"><option>General</option><option>Access</option><option>Hardware</option><option>Software</option><option>Network</option></select></div>
        <div class="col-md-6"><label class="form-label" for="priority">Priority</label><select id="priority" name="priority" class="form-select"><option>Low</option><option selected>Medium</option><option>High</option><option>Critical</option></select></div>
      </div>
    </div>
    <div class="card-footer bg-white border-0 px-4 pb-4"><button class="btn btn-primary" type="submit">Submit ticket</button></div>
  </form>
</div></div>
{% endblock %}
