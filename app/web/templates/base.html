<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} | HelpDesk EDU</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white text-dark">
  <nav class="navbar navbar-expand-lg border-bottom bg-white">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="/">HelpDesk EDU</a>
      <div class="d-flex align-items-center gap-3">
        <a class="text-decoration-none" href="/knowledge-base">Help articles</a>
        {% if user and user.role == "requester" %}
          <a class="btn btn-primary btn-sm" href="/portal">Customer portal</a>
        {% else %}
          <a class="btn btn-primary btn-sm" href="/login">Sign in</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <main class="container py-4">{% block content %}{% endblock %}</main>
</body>
</html>
